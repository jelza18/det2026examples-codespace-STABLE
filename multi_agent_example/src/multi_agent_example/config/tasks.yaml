deep_research_task:
  description: >
    Conduct a thorough research about {topic}
    Make sure you find any interesting and relevant information given
    the current year is {current_year}.
  expected_output: >
    A list with 10 bullet points of the most relevant information about {topic}
  agent: deep_researcher

broad_research_task:
  description: >
    Research {topic}
    Identify other topics which are latterally or tangentially connect to {topic}
  expected_output: >
    A list with a random number of bullet points. Use the random number tool to figure out the number of points.
  agent: broad_researcher

editing_task:
  description: >
    Review the context you got and expand each bullet into a short summary section for a report.
  expected_output: >
    A report with the main topics, each with a short summary.
    Formatted as markdown without '```'
  agent: editor
